<style>
    .responsive {
        width: 90%;
        height: auto;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    ul {
        display: table;
        width: 100%;
        margin: 0 0;
        -webkit-padding-start: 0px;
        /* reset chrome default */

        position: -webkit-sticky;
        /* Safari */
        position: sticky;
        top: 0;
    }

    ul li {
        display: table-cell;
        height: 10px;
        line-height: 10px;
        font-size: 12px;
        padding: 5px 10px;
        text-align: center;
        background-color: #99ccff;
        border-right: 2px solid #fff;
    }

    ul li:first-child {
        border-radius: 10px 0 0 10px;
    }

    ul li:last-child {
        border-radius: 0 10px 10px 0;
        border-right: 0 none;
    }

    li a {
        display: block;
        padding: 8px;
        color: white;
        text-align: center;
        text-decoration: none;
        font-family: 'Nunito', sans-serif;
        font-size: 20px;
    }

    li a:hover {
        background-color: #3399ff;
    }

    h1 {
        font-family: 'Nunito', sans-serif;
        text-align: center;
        font-size: 30px;
    }
</style>
